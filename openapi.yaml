openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Employee Attendance Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: locations
    description: Location management
  - name: attendance
    description: Attendance records
  - name: leave
    description: Leave management
  - name: reports
    description: Reports and analytics
  - name: settings
    description: User settings
  - name: ai
    description: AI assistant

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
        "401":
          description: Wrong current password

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all locations
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create location (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"

  /locations/{id}:
    patch:
      operationId: updateLocation
      tags: [locations]
      summary: Update location (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete location (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/check-in:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Employee check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/check-out:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Employee check-out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutInput"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance for current user
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary/daily:
    get:
      operationId: getDailySummary
      tags: [attendance]
      summary: Get daily attendance summary
      parameters:
        - in: query
          name: date
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: integer
      responses:
        "200":
          description: Daily summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

  /attendance/summary/monthly:
    get:
      operationId: getMonthlySummary
      tags: [attendance]
      summary: Get monthly attendance summary
      parameters:
        - in: query
          name: month
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: userId
          schema:
            type: integer
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummary"

  /leave:
    get:
      operationId: listLeave
      tags: [leave]
      summary: List leave requests
      parameters:
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: List of leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeave
      tags: [leave]
      summary: Submit leave request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/{id}:
    patch:
      operationId: updateLeave
      tags: [leave]
      summary: Approve/reject leave (admin) or cancel (employee)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
    delete:
      operationId: deleteLeave
      tags: [leave]
      summary: Delete leave request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reports/attendance:
    get:
      operationId: getAttendanceReport
      tags: [reports]
      summary: Get attendance report with filters
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
        - in: query
          name: to
          required: true
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: integer
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReport"

  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send message to AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiMessage"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReply"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, employee]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, employee]
        department:
          type: ["string", "null"]
        position:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        workHoursPerDay:
          type: number
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, employee]
        department:
          type: string
        position:
          type: string
        phone:
          type: string
        workHoursPerDay:
          type: number

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        department:
          type: string
        position:
          type: string
        phone:
          type: string
        workHoursPerDay:
          type: number

    Location:
      type: object
      required: [id, name, address, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        createdAt:
          type: string

    LocationInput:
      type: object
      required: [name, address]
      properties:
        name:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number

    LocationUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number

    AttendanceRecord:
      type: object
      required: [id, userId, date, checkIn, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        locationId:
          type: ["integer", "null"]
        locationName:
          type: ["string", "null"]
        date:
          type: string
        checkIn:
          type: string
        checkOut:
          type: ["string", "null"]
        hoursWorked:
          type: ["number", "null"]
        overtime:
          type: ["number", "null"]
        status:
          type: string
          enum: [present, late, early_leave, absent, on_leave]
        notes:
          type: ["string", "null"]
        biometricVerified:
          type: boolean
        createdAt:
          type: string

    CheckInInput:
      type: object
      required: [locationId]
      properties:
        locationId:
          type: integer
        biometricVerified:
          type: boolean
        notes:
          type: string

    CheckOutInput:
      type: object
      properties:
        notes:
          type: string

    AttendanceUpdate:
      type: object
      properties:
        checkIn:
          type: string
        checkOut:
          type: string
        status:
          type: string
        notes:
          type: string

    DailySummary:
      type: object
      required: [date, totalEmployees, present, absent, late, onLeave, totalHours]
      properties:
        date:
          type: string
        totalEmployees:
          type: integer
        present:
          type: integer
        absent:
          type: integer
        late:
          type: integer
        onLeave:
          type: integer
        totalHours:
          type: number

    MonthlySummary:
      type: object
      required: [month, year, userId, totalDays, presentDays, absentDays, leaveDays, totalHours, overtime, avgHoursPerDay]
      properties:
        month:
          type: integer
        year:
          type: integer
        userId:
          type: integer
        totalDays:
          type: integer
        presentDays:
          type: integer
        absentDays:
          type: integer
        leaveDays:
          type: integer
        totalHours:
          type: number
        overtime:
          type: number
        avgHoursPerDay:
          type: number

    LeaveRequest:
      type: object
      required: [id, userId, type, startDate, endDate, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        type:
          type: string
          enum: [annual, sick, emergency, unpaid]
        startDate:
          type: string
        endDate:
          type: string
        totalDays:
          type: integer
        reason:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reviewedBy:
          type: ["integer", "null"]
        reviewedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    LeaveInput:
      type: object
      required: [type, startDate, endDate]
      properties:
        type:
          type: string
          enum: [annual, sick, emergency, unpaid]
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: string

    LeaveUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected, cancelled]
        reason:
          type: string

    AttendanceReport:
      type: object
      required: [from, to, records, summary]
      properties:
        from:
          type: string
        to:
          type: string
        records:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        summary:
          type: object
          properties:
            totalDays:
              type: integer
            totalHours:
              type: number
            overtime:
              type: number
            presentDays:
              type: integer
            absentDays:
              type: integer
          required: [totalDays, totalHours, overtime, presentDays, absentDays]

    DashboardStats:
      type: object
      required: [totalEmployees, presentToday, absentToday, onLeaveToday, lateToday, pendingLeaves, totalHoursThisMonth, avgAttendanceRate]
      properties:
        totalEmployees:
          type: integer
        presentToday:
          type: integer
        absentToday:
          type: integer
        onLeaveToday:
          type: integer
        lateToday:
          type: integer
        pendingLeaves:
          type: integer
        totalHoursThisMonth:
          type: number
        avgAttendanceRate:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"

    UserSettings:
      type: object
      required: [userId, theme, fontSize, language]
      properties:
        userId:
          type: integer
        theme:
          type: string
          enum: [light, dark, system]
        fontSize:
          type: string
          enum: [small, medium, large]
        language:
          type: string
          enum: [ar, en, sv]

    UserSettingsUpdate:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        fontSize:
          type: string
          enum: [small, medium, large]
        language:
          type: string
          enum: [ar, en, sv]

    AiMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
        conversationHistory:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string

    AiReply:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
